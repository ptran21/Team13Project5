<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ames Classifieds</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="header-container">
        <h1>Ames, IA Classifieds</h1>
        <nav>
          <button onclick="navigateHome()">Home</button>
          <button
            id="nav-create-listing"
            onclick="showCreateListing()"
            class="hidden"
          >
            Create Listing
          </button>
          <button id="nav-login" onclick="showAuthModal('login')">
            Login / Register
          </button>
          <span
            id="nav-username"
            class="hidden"
            style="margin: 0 10px; font-weight: bold"
          ></span>
          <button id="nav-logout" onclick="logout()" class="hidden">
            Logout
          </button>
        </nav>
      </div>
    </header>

    <main>
      <section id="home-view" class="view-section active">
        <h2>Browse Categories</h2>
        <div class="sections-grid" id="sections-container"></div>
      </section>

      <section id="category-view" class="view-section hidden">
        <h2 id="category-title">Category Name</h2>
        <button onclick="navigateHome()" class="back-btn">
          ← Back to Sections
        </button>
        <div class="items-grid" id="items-container"></div>
      </section>

      <section id="create-listing-view" class="view-section hidden">
        <h2>Create New Listing</h2>

        <button onclick="navigateHome()" class="back-btn">
          ← Back to Sections
        </button>

        <form id="create-listing-form" class="listing-form">
          <label>
            Title
            <input type="text" id="listing-title" />
            <span class="error" id="title-error"></span>
          </label>

          <label>
            Category
            <select id="listing-category">
              <option value="">Select a category</option>
            </select>
            <span class="error" id="category-error"></span>
          </label>

          <label>
            Price
            <input type="number" id="listing-price" min="0" step="0.01" />
            <span class="error" id="price-error"></span>
          </label>

          <label>
            City
            <input type="text" id="listing-city" />
            <span class="error" id="city-error"></span>
          </label>

          <label>
            Phone
            <input type="text" id="listing-phone" placeholder="515-555-1234" />
            <span class="error" id="phone-error"></span>
          </label>

          <label>
            Condition
            <select id="listing-condition">
              <option value="">Select condition</option>
              <option value="New">New</option>
              <option value="Like New">Like New</option>
              <option value="Good">Good</option>
              <option value="Fair">Fair</option>
              <option value="Used">Used</option>
              <option value="Not Applicable">Not Applicable</option>
            </select>
            <span class="error" id="condition-error"></span>
          </label>

          <label>
            Description
            <textarea id="listing-description" rows="5"></textarea>
            <span class="error" id="description-error"></span>
          </label>

          <button type="submit" class="submit-btn">Submit Listing</button>

          <p id="form-message"></p>
        </form>
      </section>

      <div id="item-modal" class="modal hidden">
        <div class="modal-content">
          <span class="close-btn" onclick="closeModal()">&times;</span>
          <h2 id="modal-title">Item Title</h2>
          <div class="item-details">
            <p><strong>Price:</strong> $<span id="modal-price"></span></p>
            <p>
              <strong>Condition:</strong> <span id="modal-condition"></span>
            </p>
            <p><strong>City:</strong> <span id="modal-city"></span></p>
            <p><strong>Seller:</strong> <span id="modal-seller"></span></p>
            <p><strong>Phone:</strong> <span id="modal-phone"></span></p>
            <hr />
            <p><strong>Description:</strong></p>
            <p id="modal-description"></p>
          </div>
        </div>
      </div>

      <div id="auth-modal" class="modal hidden">
        <div class="modal-content">
          <span class="close-btn" onclick="closeAuthModal()">&times;</span>
          <h2 id="auth-title">Login</h2>
          <form id="auth-form" class="listing-form">
            <label id="auth-username-label" class="hidden">
              Username
              <input type="text" id="auth-username" />
            </label>
            <label>
              Email
              <input type="email" id="auth-email" required />
            </label>
            <label>
              Password
              <input
                type="password"
                id="auth-password"
                required
                minlength="8"
              />
            </label>
            <button type="submit" class="submit-btn" id="auth-submit-btn">
              Login
            </button>
            <p id="auth-error" style="color: red; margin-top: 10px"></p>
            <p style="text-align: center; margin-top: 15px">
              <span id="auth-toggle-text">Don't have an account?</span>
              <a
                href="#"
                onclick="toggleAuthMode(event)"
                style="color: blue; cursor: pointer"
                >Click here</a
              >
            </p>
          </form>
        </div>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
